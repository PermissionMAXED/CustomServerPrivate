# BAP Custom Server MelonLoader Mod
# Default runtime path: %APPDATA%\BAPBAPBATTLEROYALE\BapCustomServer.ini
# For normal clients, set Host to your AMP/public server IP or DNS and keep UseLocalProxy=true.
# For admin users, also fill in the [Admin] section with your token.

[Server]
Host=YOUR_SERVER_HOST_OR_DNS
Port=5055
UseHttps=false
UseLocalProxy=true
LocalProxyPort=5055

[Identity]
AccountId=
Username=
AutoGuestLogin=true

[Admin]
# Admin authentication. Only users with AccountId in the server's AdminAccountIds
# AND a matching Token can use the admin overlay (F8) and Unity dev console (F9).
# Get your admin token from the server operator.
Enabled=false
Token=

[UI]
ShowStatusChip=false
UseNativeGameUi=false
