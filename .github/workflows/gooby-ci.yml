name: Gooby CI

on:
  pull_request:
    paths:
      - "Gooby/**"
      - ".github/workflows/gooby-ci.yml"
      - ".gitignore"
  push:
    paths:
      - "Gooby/**"
      - ".github/workflows/gooby-ci.yml"
      - ".gitignore"

permissions:
  contents: read

concurrency:
  group: gooby-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Check out sources without LFS assets
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Validate Swift package manifest
        run: swift package --package-path Gooby dump-package

      - name: Build pure Swift libraries
        run: swift build --package-path Gooby -Xswiftc -warnings-as-errors

      - name: Test pure Swift libraries
        run: swift test --package-path Gooby --parallel -Xswiftc -warnings-as-errors

      - name: Generate Xcode project
        working-directory: Gooby
        run: xcodegen generate

      - name: Validate generated project and resources
        shell: bash
        run: |
          test -f Gooby/Gooby.xcodeproj/project.pbxproj
          test -z "$(git ls-files 'Gooby/Gooby.xcodeproj/**')"
          git check-ignore -q Gooby/Gooby.xcodeproj/project.pbxproj
          plutil -lint \
            Gooby/App/Generated/Info.plist \
            Gooby/App/Resources/PrivacyInfo.xcprivacy
          python3 -m json.tool \
            Gooby/App/Resources/Localizable.xcstrings \
            >/dev/null
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in Path("Gooby/App/Resources/Assets.xcassets").rglob("Contents.json"):
              with path.open(encoding="utf-8") as stream:
                  json.load(stream)
          PY
          xcodebuild -project Gooby/Gooby.xcodeproj -list

      - name: Build app for generic iOS Simulator
        run: >-
          xcodebuild
          -project Gooby/Gooby.xcodeproj
          -scheme Gooby
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Build unsigned Release app for generic iOS device
        run: >-
          xcodebuild
          -project Gooby/Gooby.xcodeproj
          -scheme Gooby
          -configuration Release
          -sdk iphoneos
          -destination 'generic/platform=iOS'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          build

      - name: Select deterministic available iPhone simulator
        id: simulator
        shell: bash
        run: |
          simulator_id="$(
            python3 - <<'PY'
          import json
          import re
          import subprocess

          payload = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "--json"],
                  text=True,
              )
          )

          def runtime_version(identifier):
              match = re.search(r"iOS-(\d+)-(\d+)", identifier)
              return tuple(map(int, match.groups())) if match else (0, 0)

          candidates = []
          for runtime, devices in payload["devices"].items():
              for device in devices:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      candidates.append(
                          (runtime_version(runtime), device["name"], device["udid"])
                      )

          if not candidates:
              raise SystemExit("No available iPhone simulator found")

          newest_runtime = max(candidate[0] for candidate in candidates)
          choices = sorted(
              candidate for candidate in candidates if candidate[0] == newest_runtime
          )
          print(choices[0][2])
          PY
          )"
          echo "id=$simulator_id" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$simulator_id" 2>/dev/null || true
          xcrun simctl bootstatus "$simulator_id" -b

      - name: Run app unit and UI tests
        shell: bash
        run: |
          mkdir -p Gooby/TestResults
          xcodebuild \
            -project Gooby/Gooby.xcodeproj \
            -scheme Gooby \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.id }},arch=arm64' \
            -resultBundlePath Gooby/TestResults/Gooby.xcresult \
            -skip-testing:GoobyUITests/GoobyDemoUITests \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Record dedicated demo journey
        shell: bash
        run: |
          simulator_id='${{ steps.simulator.outputs.id }}'
          video_path='Gooby/TestResults/gooby_full_demo.mp4'
          demo_result='Gooby/TestResults/GoobyDemo.xcresult'

          xcrun simctl shutdown "$simulator_id" 2>/dev/null || true
          xcrun simctl boot "$simulator_id"
          xcrun simctl bootstatus "$simulator_id" -b
          xcrun simctl terminate "$simulator_id" com.goobygame.app 2>/dev/null || true

          stop_recording() {
            if kill -0 "$video_pid" 2>/dev/null; then
              kill -INT "$video_pid"
              wait "$video_pid" || true
            fi
          }

          xcrun simctl io "$simulator_id" recordVideo \
            --codec=h264 \
            --force \
            "$video_path" &
          video_pid=$!
          trap stop_recording EXIT

          set +e
          xcodebuild \
            -project Gooby/Gooby.xcodeproj \
            -scheme Gooby \
            -destination "platform=iOS Simulator,id=$simulator_id,arch=arm64" \
            -resultBundlePath "$demo_result" \
            -only-testing:GoobyUITests/GoobyDemoUITests/testRecordedDemoJourney \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building
          test_status=$?
          set -e

          stop_recording
          trap - EXIT
          test -s "$video_path"
          exit "$test_status"

      - name: Upload Xcode test result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gooby-xcresult
          path: Gooby/TestResults/Gooby.xcresult
          if-no-files-found: warn
          retention-days: 7

      - name: Export demo screenshots
        if: always()
        continue-on-error: true
        run: >-
          xcrun xcresulttool export attachments
          --path Gooby/TestResults/GoobyDemo.xcresult
          --output-path Gooby/TestResults/DemoAttachments

      - name: Upload recorded demo
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gooby-recorded-demo
          path: |
            Gooby/TestResults/gooby_full_demo.mp4
            Gooby/TestResults/GoobyDemo.xcresult
            Gooby/TestResults/DemoAttachments
          if-no-files-found: error
          retention-days: 7

      - name: Export UI test attachments
        if: always()
        continue-on-error: true
        run: >-
          xcrun xcresulttool export attachments
          --path Gooby/TestResults/Gooby.xcresult
          --output-path Gooby/TestResults/Attachments

      - name: Upload UI test screenshots
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gooby-ui-screenshots
          path: Gooby/TestResults/Attachments
          if-no-files-found: warn
          retention-days: 7
