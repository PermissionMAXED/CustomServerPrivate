name: UnityIosPorter CI

on:
  pull_request:
    paths:
      - "UnityIosPorter/**"
      - ".github/workflows/unity-ios-porter-ci.yml"
      - "AGENTS.md"
  push:
    paths:
      - "UnityIosPorter/**"
      - ".github/workflows/unity-ios-porter-ci.yml"
      - "AGENTS.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unity-ios-porter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out sources without LFS assets
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python3 -m compileall -q UnityIosPorter
      - name: Run unit tests
        run: python3 -m unittest discover -s UnityIosPorter/tests -v
