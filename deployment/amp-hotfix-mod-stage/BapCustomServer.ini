# BAP Custom Server MelonLoader Mod
# Default runtime path: %APPDATA%\BAPBAPBATTLEROYALE\BapCustomServer.ini
# For normal clients, set Host to your AMP/public server IP or DNS and keep UseLocalProxy=true.

[Server]
Host=YOUR_SERVER_HOST_OR_DNS
Port=5055
UseHttps=false
UseLocalProxy=true
LocalProxyPort=5055

[Identity]
AccountId=
Username=
AutoGuestLogin=true

[UI]
ShowStatusChip=true
UseNativeGameUi=true
