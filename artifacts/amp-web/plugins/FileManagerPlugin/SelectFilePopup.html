ï»¿<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div class="wizardContents wizardPopup" id="FMSelectFilePopup">
        <h2 data-bind="text: popupTitle">Select File</h2>

        <div data-bind="foreach: pathSegments" style="display:inline-block; margin-left:4px;">
            <div class="fmPathSegment" data-bind="text: name, click: click"></div>
        </div>

        <div id="TargetDirectoryList" data-bind="foreach: entries">
            <div class="fileManagerEntry" data-bind="click: click, css: {selected : selected}">
                <img data-bind="attr: {src: icon}" />
                <div class="fileEntryTitle" data-bind="text: name"></div>
                <div class="fileEntrySubtitle" data-bind="text: subtitle"></div>
            </div>
        </div>

        <div class="buttonGroup flexButtonGroup">
            <button data-bind="click: select, enable: selectedEntry() != null" class="bgGreen">
                <span data-bind="text: actionText">Select File</span>
            </button>
            <button data-bind="click: cancel" class="bgRed">
                <span>Cancel</span>
            </button>
        </div>
    </div>
</body>
</html>
