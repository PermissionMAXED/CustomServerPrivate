name: Gooby
options:
  bundleIdPrefix: com.goobygame
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Release: release

packages:
  GoobyKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    OTHER_SWIFT_FLAGS: "$(inherited) -Xfrontend -disable-autolink-framework -Xfrontend AppIntents"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  Gooby:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Sources
    resources:
      - path: App/Resources
    dependencies:
      - package: GoobyKit
        product: GoobyCore
      - package: GoobyKit
        product: GoobyPersistence
      - sdk: AVFoundation.framework
      - sdk: RealityKit.framework
      - sdk: UIKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goobygame.app
        PRODUCT_NAME: Gooby
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: App/Generated/Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleDisplayName: Gooby
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.games
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  GoobyAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppTests
    dependencies:
      - target: Gooby
      - sdk: RealityKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goobygame.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Gooby.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Gooby"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

  GoobyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: Gooby
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goobygame.app.uitests
        TEST_TARGET_NAME: Gooby
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Gooby:
    shared: true
    build:
      targets:
        Gooby: all
        GoobyAppTests: [test]
        GoobyUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: GoobyAppTests
          parallelizable: true
        - name: GoobyUITests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
